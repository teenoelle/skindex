name: Review Queued Ingredients

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger review endpoint
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/review-ingredients" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --silent \
            --show-error
